<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bewaarhet - E-mailadres bevestigd</title>
  <style>
    :root { --bg: #fbf7ef; --card: #fffdf8; --ink: #1d2825; --muted: #64716c; --green: #2f7a5f; --line: #e6ded1; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 32px 18px; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(180deg, #fffaf1, var(--bg)); color: var(--ink); line-height: 1.55; }
    main { width: min(680px, 100%); background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: clamp(28px, 6vw, 48px); box-shadow: 0 20px 60px rgba(29, 40, 37, 0.12); }
    .mark { width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center; background: #e7f1ea; color: var(--green); font-size: 30px; margin-bottom: 22px; }
    h1 { margin: 0 0 12px; font-size: clamp(30px, 7vw, 46px); line-height: 1.08; letter-spacing: 0; }
    p { margin: 0 0 18px; color: var(--muted); font-size: 17px; }
    ul { margin: 8px 0 28px; padding-left: 22px; color: var(--ink); }
    li { margin: 8px 0; }
    a { color: var(--green); font-weight: 700; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 26px; }
    .button, .secondary { display: inline-flex; align-items: center; justify-content: center; min-height: 44px; padding: 11px 16px; border-radius: 8px; text-decoration: none; }
    .button { background: var(--green); color: white; }
    .secondary { border: 1px solid var(--line); color: var(--ink); background: white; }
  </style>
</head>
<body>
  <main>
    <div class="mark">OK</div>
    <h1>Je e-mailadres is bevestigd.</h1>
    <p>Je kunt nu Bewaarhet testen.</p>
    <ul>
      <li>Stuur PDF, JPG, JPEG of PNG naar <a href="mailto:bewaren@bewaarhet.nl">bewaren@bewaarhet.nl</a>.</li>
      <li>Documenten worden automatisch opgeslagen.</li>
      <li>Later kun je ze opvragen via <a href="mailto:zoek@bewaarhet.nl">zoek@bewaarhet.nl</a>.</li>
    </ul>
    <div class="actions">
      <a class="button" href="{{PUBLIC_SITE_URL}}">Terug naar Bewaarhet</a>
      {{FAQ_LINK}}
    </div>
  </main>
</body>
</html>
