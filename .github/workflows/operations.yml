name: Bewaarhet Operations

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Operation to run
        required: true
        type: choice
        options:
          - status
          - logs-worker
          - logs-site
          - logs-collector
          - restart-worker
          - restart-site
          - restart-collector
          - restart-all
      log_lines:
        description: Number of log lines for log operations
        required: false
        default: "200"

concurrency:
  group: bewaarhet-production-operations
  cancel-in-progress: false

jobs:
  operation:
    name: Run operation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run server operation
        env:
          BEWAARHET_DEPLOY_HOST: ${{ secrets.BEWAARHET_DEPLOY_HOST }}
          BEWAARHET_DEPLOY_PORT: ${{ secrets.BEWAARHET_DEPLOY_PORT }}
          BEWAARHET_DEPLOY_USER: ${{ secrets.BEWAARHET_DEPLOY_USER }}
          BEWAARHET_DEPLOY_SSH_KEY: ${{ secrets.BEWAARHET_DEPLOY_SSH_KEY }}
          OPERATION: ${{ inputs.operation }}
          LOG_LINES: ${{ inputs.log_lines }}
        run: |
          set -Eeuo pipefail

          : "${BEWAARHET_DEPLOY_HOST:?Missing BEWAARHET_DEPLOY_HOST secret}"
          : "${BEWAARHET_DEPLOY_PORT:?Missing BEWAARHET_DEPLOY_PORT secret}"
          : "${BEWAARHET_DEPLOY_USER:?Missing BEWAARHET_DEPLOY_USER secret}"
          : "${BEWAARHET_DEPLOY_SSH_KEY:?Missing BEWAARHET_DEPLOY_SSH_KEY secret}"

          case "$OPERATION" in
            status|logs-worker|logs-site|logs-collector|restart-worker|restart-site|restart-collector|restart-all) ;;
            *)
              echo "Unsupported operation: $OPERATION" >&2
              exit 64
              ;;
          esac

          case "$LOG_LINES" in
            ''|*[!0-9]*)
              LOG_LINES=200
              ;;
          esac
          if [ "$LOG_LINES" -lt 1 ]; then
            LOG_LINES=1
          elif [ "$LOG_LINES" -gt 1000 ]; then
            LOG_LINES=1000
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$BEWAARHET_DEPLOY_SSH_KEY" > ~/.ssh/bewaarhet_deploy
          chmod 600 ~/.ssh/bewaarhet_deploy

          ssh-keyscan -p "$BEWAARHET_DEPLOY_PORT" "$BEWAARHET_DEPLOY_HOST" >> ~/.ssh/known_hosts

          ssh \
            -i ~/.ssh/bewaarhet_deploy \
            -p "$BEWAARHET_DEPLOY_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$BEWAARHET_DEPLOY_USER@$BEWAARHET_DEPLOY_HOST" \
            "operation:$OPERATION:$LOG_LINES"
