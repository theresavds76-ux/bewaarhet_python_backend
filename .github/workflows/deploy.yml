name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bewaarhet-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to vdsserver
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger server deploy
        env:
          BEWAARHET_DEPLOY_HOST: ${{ secrets.BEWAARHET_DEPLOY_HOST }}
          BEWAARHET_DEPLOY_PORT: ${{ secrets.BEWAARHET_DEPLOY_PORT }}
          BEWAARHET_DEPLOY_USER: ${{ secrets.BEWAARHET_DEPLOY_USER }}
          BEWAARHET_DEPLOY_SSH_KEY: ${{ secrets.BEWAARHET_DEPLOY_SSH_KEY }}
          ALLOWED_EXTENSIONS: ${{ vars.ALLOWED_EXTENSIONS }}
          BETTER_STACK_INGESTING_HOST: ${{ vars.BETTER_STACK_INGESTING_HOST }}
          BETTER_STACK_SOURCE_TOKEN: ${{ secrets.BETTER_STACK_SOURCE_TOKEN }}
          DATABASE_PATH: ${{ vars.DATABASE_PATH }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_BASE_PATH: ${{ vars.DROPBOX_BASE_PATH }}
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          MAX_ATTACHMENT_MB: ${{ vars.MAX_ATTACHMENT_MB }}
          OCR_SPACE_API_KEY: ${{ secrets.OCR_SPACE_API_KEY }}
          OCR_SPACE_LANGUAGE: ${{ vars.OCR_SPACE_LANGUAGE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          POLL_SECONDS: ${{ vars.POLL_SECONDS }}
          SEARCH_RESULT_LIMIT: ${{ vars.SEARCH_RESULT_LIMIT }}
          ZOHO_APP_PASSWORD: ${{ secrets.ZOHO_APP_PASSWORD }}
          ZOHO_EMAIL: ${{ vars.ZOHO_EMAIL }}
          ZOHO_IMAP_HOST: ${{ vars.ZOHO_IMAP_HOST }}
          ZOHO_IMAP_PORT: ${{ vars.ZOHO_IMAP_PORT }}
          ZOHO_SMTP_HOST: ${{ vars.ZOHO_SMTP_HOST }}
          ZOHO_SMTP_PORT: ${{ vars.ZOHO_SMTP_PORT }}
        run: |
          set -Eeuo pipefail

          : "${BEWAARHET_DEPLOY_HOST:?Missing BEWAARHET_DEPLOY_HOST secret}"
          : "${BEWAARHET_DEPLOY_PORT:?Missing BEWAARHET_DEPLOY_PORT secret}"
          : "${BEWAARHET_DEPLOY_USER:?Missing BEWAARHET_DEPLOY_USER secret}"
          : "${BEWAARHET_DEPLOY_SSH_KEY:?Missing BEWAARHET_DEPLOY_SSH_KEY secret}"
          : "${ZOHO_APP_PASSWORD:?Missing ZOHO_APP_PASSWORD secret}"
          : "${DROPBOX_REFRESH_TOKEN:?Missing DROPBOX_REFRESH_TOKEN secret}"
          : "${DROPBOX_APP_KEY:?Missing DROPBOX_APP_KEY secret}"
          : "${DROPBOX_APP_SECRET:?Missing DROPBOX_APP_SECRET secret}"
          : "${OCR_SPACE_API_KEY:?Missing OCR_SPACE_API_KEY secret}"

          : "${ZOHO_EMAIL:=service@bewaarhet.nl}"
          : "${ZOHO_IMAP_HOST:=imap.zoho.eu}"
          : "${ZOHO_IMAP_PORT:=993}"
          : "${ZOHO_SMTP_HOST:=smtp.zoho.eu}"
          : "${ZOHO_SMTP_PORT:=587}"
          : "${DROPBOX_BASE_PATH:=/Bewaar het/Klanten}"
          : "${OCR_SPACE_LANGUAGE:=dut}"
          : "${OPENAI_MODEL:=gpt-5-mini}"
          : "${POLL_SECONDS:=60}"
          : "${SEARCH_RESULT_LIMIT:=10}"
          : "${MAX_ATTACHMENT_MB:=15}"
          : "${ALLOWED_EXTENSIONS:=.pdf,.jpg,.jpeg,.png,.docx,.xlsx,.csv,.txt,.zip}"
          : "${DATABASE_PATH:=/app/data/bewaarhet.sqlite3}"

          write_env() {
            printf '%s=%s\n' "$1" "$2" >> bewaarhet.env
          }
          write_env_if_set() {
            if [ -n "${2:-}" ]; then
              write_env "$1" "$2"
            fi
          }

          : > bewaarhet.env
          write_env ZOHO_EMAIL "$ZOHO_EMAIL"
          write_env ZOHO_IMAP_HOST "$ZOHO_IMAP_HOST"
          write_env ZOHO_IMAP_PORT "$ZOHO_IMAP_PORT"
          write_env ZOHO_SMTP_HOST "$ZOHO_SMTP_HOST"
          write_env ZOHO_SMTP_PORT "$ZOHO_SMTP_PORT"
          write_env ZOHO_APP_PASSWORD "$ZOHO_APP_PASSWORD"
          write_env DROPBOX_REFRESH_TOKEN "$DROPBOX_REFRESH_TOKEN"
          write_env DROPBOX_APP_KEY "$DROPBOX_APP_KEY"
          write_env DROPBOX_APP_SECRET "$DROPBOX_APP_SECRET"
          write_env DROPBOX_BASE_PATH "$DROPBOX_BASE_PATH"
          write_env OCR_SPACE_API_KEY "$OCR_SPACE_API_KEY"
          write_env OCR_SPACE_LANGUAGE "$OCR_SPACE_LANGUAGE"
          write_env OPENAI_API_KEY "${OPENAI_API_KEY:-}"
          write_env OPENAI_MODEL "$OPENAI_MODEL"
          write_env DATABASE_PATH "$DATABASE_PATH"
          write_env POLL_SECONDS "$POLL_SECONDS"
          write_env SEARCH_RESULT_LIMIT "$SEARCH_RESULT_LIMIT"
          write_env MAX_ATTACHMENT_MB "$MAX_ATTACHMENT_MB"
          write_env ALLOWED_EXTENSIONS "$ALLOWED_EXTENSIONS"
          write_env_if_set BETTER_STACK_SOURCE_TOKEN "${BETTER_STACK_SOURCE_TOKEN:-}"
          write_env_if_set BETTER_STACK_INGESTING_HOST "${BETTER_STACK_INGESTING_HOST:-}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$BEWAARHET_DEPLOY_SSH_KEY" > ~/.ssh/bewaarhet_deploy
          chmod 600 ~/.ssh/bewaarhet_deploy

          ssh-keyscan -p "$BEWAARHET_DEPLOY_PORT" "$BEWAARHET_DEPLOY_HOST" >> ~/.ssh/known_hosts

          ssh \
            -i ~/.ssh/bewaarhet_deploy \
            -p "$BEWAARHET_DEPLOY_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$BEWAARHET_DEPLOY_USER@$BEWAARHET_DEPLOY_HOST" \
            deploy-with-env < bewaarhet.env
