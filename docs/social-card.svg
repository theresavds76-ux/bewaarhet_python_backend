<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Bewaarhet social card">
  <defs>
    <radialGradient id="glow" cx="58%" cy="50%" r="54%">
      <stop offset="0" stop-color="#60a5ff" stop-opacity="0.75"/>
      <stop offset="0.42" stop-color="#255dff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#020713" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071b3a"/>
      <stop offset="0.58" stop-color="#061225"/>
      <stop offset="1" stop-color="#020713"/>
    </linearGradient>
    <linearGradient id="box" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#172a4f"/>
