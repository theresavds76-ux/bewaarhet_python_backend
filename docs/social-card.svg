  <text x="876" y="154" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#12366d" transform="rotate(6 876 154)">FACTUUR</text>
  <text x="1014" y="214" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#245eea" transform="rotate(14 1014 214)">PDF</text>
