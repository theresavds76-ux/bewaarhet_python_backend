  <text x="82" y="86" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#eef6ff">Bewaarhet</text>
  <text x="82" y="220" font-family="Arial, sans-serif" font-size="66" font-weight="800" fill="#ffffff">Jouw slimme</text>
  <text x="82" y="296" font-family="Arial, sans-serif" font-size="66" font-weight="800" fill="#60a5ff">document inbox.</text>
  <text x="82" y="374" font-family="Arial, sans-serif" font-size="34" fill="#c8d8ec">Mail je documenten. Wij bewaren ze veilig.</text>
  <text x="82" y="424" font-family="Arial, sans-serif" font-size="34" fill="#c8d8ec">Jij vindt ze later terug.</text>
  <rect x="710" y="390" width="330" height="128" rx="18" fill="url(#box)" stroke="#79d8ff" stroke-opacity="0.38" stroke-width="3"/>
  <rect x="760" y="414" width="230" height="24" rx="9" fill="#020713"/>
