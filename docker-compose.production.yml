services:
  bewaarhet_site:
    build:
      context: .
      dockerfile: Dockerfile.site
    image: bewaarhet_site:latest
    container_name: bewaarhet_site
    restart: unless-stopped
    networks:
      - traefik_webgateway
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_webgateway"
      - "traefik.http.routers.bewaarhet_site_nl.rule=Host(`bewaarhet.nl`) || Host(`www.bewaarhet.nl`)"
      - "traefik.http.routers.bewaarhet_site_nl.entrypoints=websecure"
      - "traefik.http.routers.bewaarhet_site_nl.tls.certresolver=myresolver"
      - "traefik.http.services.bewaarhet_site.loadbalancer.server.port=80"

  bewaarhet_worker:
    profiles:
      - worker
    build:
      context: .
      dockerfile: Dockerfile
    image: bewaarhet_python_backend:latest
    container_name: bewaarhet_worker
    restart: unless-stopped
    env_file:
      - path: ${BEWAARHET_ENV_FILE:-/root/bewaarhet.env}
        required: false
    environment:
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/bewaarhet.sqlite3
      BACKUP_DIR: /app/data/backups
      LOG_DIR: /app/data/logs
      PYTHONUNBUFFERED: "1"
    labels:
      - "traefik.enable=false"
    volumes:
      - ${BEWAARHET_DATA_MOUNT:-bewaarhet_data}:/app/data

  bewaarhet_activation:
    build:
      context: .
      dockerfile: Dockerfile
    image: bewaarhet_python_backend:latest
    container_name: bewaarhet_activation
    restart: unless-stopped
    command: ["python", "-m", "bewaarhet.activation_server"]
    env_file:
      - path: ${BEWAARHET_ENV_FILE:-/root/bewaarhet.env}
        required: false
    environment:
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/bewaarhet.sqlite3
      BACKUP_DIR: /app/data/backups
      LOG_DIR: /app/data/logs
      ACTIVATION_SERVER_HOST: 0.0.0.0
      ACTIVATION_SERVER_PORT: "8080"
      PYTHONUNBUFFERED: "1"
    networks:
      - traefik_webgateway
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_webgateway"
      - "traefik.http.routers.bewaarhet_activation_nl.rule=(Host(`bewaarhet.nl`) || Host(`www.bewaarhet.nl`)) && PathPrefix(`/activeer`)"
      - "traefik.http.routers.bewaarhet_activation_nl.entrypoints=websecure"
      - "traefik.http.routers.bewaarhet_activation_nl.tls.certresolver=myresolver"
      - "traefik.http.routers.bewaarhet_activation_nl.priority=100"
      - "traefik.http.services.bewaarhet_activation.loadbalancer.server.port=8080"
    volumes:
      - ${BEWAARHET_DATA_MOUNT:-bewaarhet_data}:/app/data

  bewaarhet_logs:
    profiles:
      - logging
    image: timberio/vector:0.55.0-alpine
    container_name: bewaarhet_logs
    restart: unless-stopped
    user: "0:0"
    environment:
      BETTER_STACK_INGESTING_HOST: ${BETTER_STACK_INGESTING_HOST:-}
      BETTER_STACK_SOURCE_TOKEN: ${BETTER_STACK_SOURCE_TOKEN:-}
      VECTOR_LOG: info
    labels:
      - "traefik.enable=false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - bewaarhet_vector_data:/vector-data-dir

volumes:
  bewaarhet_data:
  bewaarhet_vector_data:

networks:
  traefik_webgateway:
    external: true
